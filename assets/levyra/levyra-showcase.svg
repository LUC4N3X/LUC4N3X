<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Levyra Native Android Music Experience">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050711"/>
      <stop offset="0.52" stop-color="#090D1B"/>
      <stop offset="1" stop-color="#11102A"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.52" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="oceanGlow" cx="0" cy="0" r="1" gradientTransform="translate(1030 80) rotate(135) scale(390 300)">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.24"/>
      <stop offset="0.45" stop-color="#2563EB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconGlow" cx="0" cy="0" r="1" gradientTransform="translate(154 181) scale(140)">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.24"/>
      <stop offset="0.48" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#94A3B8" stroke-opacity="0.035"/>
    </pattern>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cardClip">
      <rect width="1200" height="420" rx="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1200" height="420" fill="url(#background)"/>
    <rect width="1200" height="420" fill="url(#oceanGlow)"/>
    <rect width="1200" height="420" fill="url(#grid)"/>
    <circle cx="154" cy="181" r="140" fill="url(#iconGlow)"/>
    <path d="M0 357C164 305 302 395 467 344C650 288 775 308 936 351C1050 382 1132 357 1200 322V420H0Z" fill="#38BDF8" opacity="0.025"/>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="417" rx="32.5" fill="none" stroke="url(#border)" stroke-width="3"/>

  <g transform="translate(74 58)">
    <rect width="170" height="170" rx="42" fill="#050711" stroke="#7DD3FC" stroke-opacity="0.18"/>
    <image xlink:href="data:image/png;base64," x="10" y="10" width="150" height="150" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g transform="translate(286 60)">
    <rect width="218" height="34" rx="17" fill="#0B1728" stroke="#38BDF8" stroke-opacity="0.32"/>
    <circle cx="20" cy="17" r="5" fill="#67E8F9" filter="url(#softGlow)"/>
    <text x="36" y="22" fill="#BAE6FD" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="750" letter-spacing="2.2">FLAGSHIP PROJECT</text>

    <text x="0" y="111" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="72" font-weight="850" letter-spacing="-2.5">LEVYRA</text>
    <rect x="1" y="126" width="328" height="4" rx="2" fill="url(#accent)"/>

    <text x="0" y="174" fill="#D9E5F2" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="650">Native Android music, built without shortcuts.</text>
    <text x="0" y="211" fill="#8FA3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="500">Fast playback · resilient downloads · synchronized lyrics</text>
    <text x="0" y="239" fill="#8FA3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="500">smart discovery · offline-first control · polished Compose UI</text>
  </g>

  <g transform="translate(74 276)" font-family="Inter,Segoe UI,Arial,sans-serif">
    <g>
      <rect width="164" height="52" rx="18" fill="#0A1422" stroke="#22D3EE" stroke-opacity="0.28"/>
      <text x="18" y="22" fill="#67E8F9" font-size="12" font-weight="750" letter-spacing="1.6">PLAYBACK</text>
      <text x="18" y="40" fill="#E2E8F0" font-size="15" font-weight="650">Media3 engine</text>
    </g>
    <g transform="translate(176)">
      <rect width="164" height="52" rx="18" fill="#0A1422" stroke="#60A5FA" stroke-opacity="0.28"/>
      <text x="18" y="22" fill="#93C5FD" font-size="12" font-weight="750" letter-spacing="1.6">DOWNLOADS</text>
      <text x="18" y="40" fill="#E2E8F0" font-size="15" font-weight="650">Offline-ready</text>
    </g>
    <g transform="translate(352)">
      <rect width="164" height="52" rx="18" fill="#0A1422" stroke="#A78BFA" stroke-opacity="0.3"/>
      <text x="18" y="22" fill="#C4B5FD" font-size="12" font-weight="750" letter-spacing="1.6">LYRICS</text>
      <text x="18" y="40" fill="#E2E8F0" font-size="15" font-weight="650">Time-synced</text>
    </g>
    <g transform="translate(528)">
      <rect width="164" height="52" rx="18" fill="#0A1422" stroke="#C084FC" stroke-opacity="0.3"/>
      <text x="18" y="22" fill="#D8B4FE" font-size="12" font-weight="750" letter-spacing="1.6">INTERFACE</text>
      <text x="18" y="40" fill="#E2E8F0" font-size="15" font-weight="650">Compose-native</text>
    </g>
  </g>

  <g transform="translate(846 71)">
    <rect width="286" height="278" rx="28" fill="#070C17" fill-opacity="0.82" stroke="#94A3B8" stroke-opacity="0.16"/>
    <text x="28" y="42" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="750" letter-spacing="2.4">ENGINEERED NATIVE</text>

    <g transform="translate(28 66)" font-family="Inter,Segoe UI,Arial,sans-serif">
      <circle cx="8" cy="8" r="8" fill="#7C3AED" opacity="0.24"/>
      <circle cx="8" cy="8" r="3.5" fill="#C4B5FD"/>
      <text x="28" y="14" fill="#F1F5F9" font-size="18" font-weight="700">Kotlin</text>
      <text x="28" y="37" fill="#7F93A8" font-size="14">Structured application logic</text>

      <circle cx="8" cy="78" r="8" fill="#2563EB" opacity="0.24"/>
      <circle cx="8" cy="78" r="3.5" fill="#93C5FD"/>
      <text x="28" y="84" fill="#F1F5F9" font-size="18" font-weight="700">Jetpack Compose</text>
      <text x="28" y="107" fill="#7F93A8" font-size="14">Responsive native interface</text>

      <circle cx="8" cy="148" r="8" fill="#0891B2" opacity="0.24"/>
      <circle cx="8" cy="148" r="3.5" fill="#67E8F9"/>
      <text x="28" y="154" fill="#F1F5F9" font-size="18" font-weight="700">AndroidX Media3</text>
      <text x="28" y="177" fill="#7F93A8" font-size="14">Playback and media sessions</text>
    </g>

    <rect x="28" y="244" width="230" height="1" fill="url(#accent)" opacity="0.42"/>
    <text x="28" y="267" fill="#A8B8C8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="650">BUILT · TESTED · REFINED</text>
  </g>

  <circle cx="1153" cy="31" r="4" fill="#67E8F9"/>
  <circle cx="1135" cy="31" r="4" fill="#60A5FA" opacity="0.75"/>
  <circle cx="1117" cy="31" r="4" fill="#C084FC" opacity="0.75"/>
</svg>
