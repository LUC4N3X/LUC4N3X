<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" role="img" aria-labelledby="title desc">
  <title id="title">Animated abyss flow divider</title>
  <desc id="desc">A transparent animated neon ocean divider with flowing cyan, violet and ember wave trails.</desc>
  <defs>
    <linearGradient id="abyssStroke" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#082f49" stop-opacity="0" />
      <stop offset="12%" stop-color="#0ea5e9" stop-opacity="0.85" />
      <stop offset="34%" stop-color="#22d3ee" stop-opacity="1" />
      <stop offset="54%" stop-color="#7c3aed" stop-opacity="0.9" />
      <stop offset="72%" stop-color="#f97316" stop-opacity="1" />
      <stop offset="88%" stop-color="#fb7185" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
      <animate attributeName="x1" values="-260;0;260;-260" dur="11s" repeatCount="indefinite" />
      <animate attributeName="x2" values="940;1200;1460;940" dur="11s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="deepStroke" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617" stop-opacity="0" />
      <stop offset="24%" stop-color="#075985" stop-opacity="0.55" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.72" />
      <stop offset="78%" stop-color="#312e81" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
      <animate attributeName="x1" values="220;-160;220" dur="15s" repeatCount="indefinite" />
      <animate attributeName="x2" values="1420;1040;1420" dur="15s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="emberStroke" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617" stop-opacity="0" />
      <stop offset="30%" stop-color="#0ea5e9" stop-opacity="0.2" />
      <stop offset="52%" stop-color="#fb7185" stop-opacity="0.8" />
      <stop offset="72%" stop-color="#f97316" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
      <animate attributeName="x1" values="-420;120;-420" dur="9s" repeatCount="indefinite" />
      <animate attributeName="x2" values="780;1320;780" dur="9s" repeatCount="indefinite" />
    </linearGradient>

    <radialGradient id="pulse" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.36" />
      <stop offset="42%" stop-color="#0ea5e9" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>

    <filter id="softGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05  0 0 0 0 0.72  0 0 0 0 1  0 0 0 0.75 0" result="cyanGlow" />
      <feMerge>
        <feMergeNode in="cyanGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="emberGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.98  0 0 0 0 0.33  0 0 0 0 0.14  0 0 0 0.72 0" result="orangeGlow" />
      <feMerge>
        <feMergeNode in="orangeGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <path id="flowPath" d="M 26 83 C 168 21, 306 122, 458 78 C 617 32, 716 27, 875 74 C 1000 111, 1089 93, 1174 55" />
    <path id="underPath" d="M 30 100 C 205 53, 326 133, 492 96 C 661 58, 742 54, 916 94 C 1048 124, 1118 109, 1170 92" />
    <path id="emberPath" d="M 92 58 C 218 33, 300 77, 408 80 C 529 84, 602 32, 732 49 C 870 68, 940 128, 1108 71" />
  </defs>

  <rect x="0" y="0" width="1200" height="150" fill="transparent" />

  <ellipse cx="600" cy="78" rx="485" ry="42" fill="url(#pulse)" opacity="0.18">
    <animate attributeName="opacity" values="0.08;0.22;0.12;0.2;0.08" dur="7s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="scale" values="1 0.84;1.08 1;1 0.84" dur="8s" repeatCount="indefinite" additive="sum" />
  </ellipse>

  <g opacity="0.42" filter="url(#softGlow)">
    <use href="#underPath" fill="none" stroke="url(#deepStroke)" stroke-width="14" stroke-linecap="round" stroke-dasharray="22 72">
      <animate attributeName="stroke-dashoffset" values="0;-420" dur="13s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.28;0.55;0.34;0.48;0.28" dur="9s" repeatCount="indefinite" />
    </use>
  </g>

  <g filter="url(#softGlow)">
    <use href="#flowPath" fill="none" stroke="url(#abyssStroke)" stroke-width="4.4" stroke-linecap="round" stroke-dasharray="680 260">
      <animate attributeName="stroke-dashoffset" values="0;-940" dur="8s" repeatCount="indefinite" />
    </use>
    <use href="#flowPath" fill="none" stroke="#7dd3fc" stroke-width="1.3" stroke-linecap="round" opacity="0.86" stroke-dasharray="90 42 20 140">
      <animate attributeName="stroke-dashoffset" values="0;-520" dur="5.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.38;0.88;0.45;0.72;0.38" dur="6.2s" repeatCount="indefinite" />
    </use>
  </g>

  <g filter="url(#emberGlow)">
    <use href="#emberPath" fill="none" stroke="url(#emberStroke)" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="110 330">
      <animate attributeName="stroke-dashoffset" values="0;-880" dur="10.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.25;0.75;0.35;0.62;0.25" dur="8s" repeatCount="indefinite" />
    </use>
  </g>

  <g opacity="0.88">
    <circle r="3.2" fill="#38bdf8" filter="url(#softGlow)">
      <animateMotion dur="7.2s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flowPath" />
      </animateMotion>
      <animate attributeName="opacity" values="0;1;0.55;0" dur="7.2s" repeatCount="indefinite" />
    </circle>
    <circle r="2.2" fill="#f97316" filter="url(#emberGlow)">
      <animateMotion dur="9.4s" begin="-3s" repeatCount="indefinite" rotate="auto">
        <mpath href="#emberPath" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.3;0" dur="9.4s" begin="-3s" repeatCount="indefinite" />
    </circle>
    <circle r="2.8" fill="#22d3ee" filter="url(#softGlow)">
      <animateMotion dur="11s" begin="-6s" repeatCount="indefinite" rotate="auto">
        <mpath href="#underPath" />
      </animateMotion>
      <animate attributeName="opacity" values="0;0.72;0.25;0" dur="11s" begin="-6s" repeatCount="indefinite" />
    </circle>
  </g>

  <g opacity="0.32" filter="url(#softGlow)">
    <path d="M 130 116 C 284 89, 349 139, 514 113 C 676 87, 778 98, 914 121 C 1038 143, 1120 135, 1184 120" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="8 22">
      <animate attributeName="stroke-dashoffset" values="0;-180" dur="12s" repeatCount="indefinite" />
    </path>
    <path d="M 52 39 C 188 76, 292 12, 446 42 C 598 72, 710 34, 844 31 C 989 28, 1051 53, 1146 29" fill="none" stroke="#a78bfa" stroke-width="1" stroke-linecap="round" stroke-dasharray="6 30">
      <animate attributeName="stroke-dashoffset" values="0;220" dur="15s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
